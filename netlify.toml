[build]
  command = "hugo --gc --minify -b $URL"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.92.2"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent your site from being embedded in iframes on other domains (clickjacking)
    X-Frame-Options = "SAMEORIGIN"
    # Stop browsers guessing MIME types from content (MIME-sniffing attacks)
    X-Content-Type-Options = "nosniff"
    # Only send the origin (no path) in the Referer header when following external links
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict access to browser features not needed by an academic personal site
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Force HTTPS for 1 year; include subdomains so files.arturobminski.com is also covered
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[plugins]]
  package = "netlify-plugin-hugo-cache-resources"
  [plugins.inputs]
    debug = true
